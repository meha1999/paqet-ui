version: '3.8'

services:
  paqet-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paqet-ui
    ports:
      - "2053:2053"
    environment:
      - LOG_LEVEL=info
      - PANEL_PORT=2053
      - PANEL_PATH=/panel
    volumes:
      - paqet-ui-data:/home/paqet-ui/.paqet-ui
      - ./web/html:/app/web/html:ro  # For development - hot reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2053/panel/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - paqet-network
    labels:
      com.example.description: "Paqet UI - Web Management Panel"

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: paqet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # For SSL certificates
    depends_on:
      - paqet-ui
    restart: unless-stopped
    networks:
      - paqet-network
    profiles:
      - with-nginx

networks:
  paqet-network:
    driver: bridge

volumes:
  paqet-ui-data:
    driver: local
