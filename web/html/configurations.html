<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paqet UI - Configurations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css">
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --secondary: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #ecf0f1;
        }

        .navbar {
            background: var(--secondary);
        }

        .card {
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn {
            border-radius: 4px;
            padding: 8px 16px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-danger {
            background: var(--danger);
            border: none;
            color: white;
        }

        .btn-success {
            background: var(--success);
            border: none;
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            border: none;
            color: white;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge-client {
            background: rgba(52,152,219,0.2);
            color: var(--primary);
        }

        .badge-server {
            background: rgba(231,76,60,0.2);
            color: var(--danger);
        }

        .config-item {
            background: white;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-item.active {
            border-left-color: var(--success);
            background: rgba(39,174,96,0.05);
        }

        .config-info h6 {
            margin: 0;
            font-weight: bold;
            color: var(--secondary);
        }

        .config-info small {
            display: block;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
        }

        .modal-header .close {
            color: white;
        }

        textarea {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(52,152,219,0.25);
        }

        .alert {
            border: none;
            border-left: 4px solid;
        }

        .alert-success {
            background: rgba(39,174,96,0.1);
            border-left-color: var(--success);
            color: var(--success);
        }

        .alert-danger {
            background: rgba(231,76,60,0.1);
            border-left-color: var(--danger);
            color: var(--danger);
        }

        .alert-info {
            background: rgba(52,152,219,0.1);
            border-left-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/panel/dashboard">
                <i class="fas fa-network-wired"></i> Paqet UI
            </a>
            <div class="ml-auto">
                <a href="/panel/logout" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div id="alerts-container"></div>

        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="fas fa-cogs"></i> Configurations</h1>
                <p class="text-muted">Manage your Paqet proxy configurations</p>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="row mb-4">
            <div class="col-12">
                <button class="btn btn-primary" data-toggle="modal" data-target="#newConfigModal">
                    <i class="fas fa-plus"></i> New Configuration
                </button>
                <button class="btn btn-secondary" onclick="refreshConfigs()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Configurations List -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Available Configurations</h5>
                    </div>
                    <div class="card-body" id="configs-container">
                        <div class="text-muted text-center py-5">
                            <i class="fas fa-spinner fa-spin fa-2x"></i>
                            <p>Loading configurations...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Configuration Modal -->
    <div class="modal fade" id="newConfigModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-plus-circle"></i> Create New Configuration
                    </h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="config-name">Configuration Name</label>
                        <input type="text" class="form-control" id="config-name" placeholder="e.g., My VPN Client">
                    </div>
                    <div class="form-group">
                        <label for="config-role">Role</label>
                        <select class="form-control" id="config-role">
                            <option value="">-- Select Role --</option>
                            <option value="client">Client</option>
                            <option value="server">Server</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="config-yaml">YAML Configuration</label>
                        <textarea class="form-control" id="config-yaml" rows="12" placeholder="role: client&#10;&#10;network:&#10;  interface: en0&#10;  ipv4:&#10;    addr: 192.168.1.100:0&#10;    router_mac: aa:bb:cc:dd:ee:ff&#10;&#10;server:&#10;  addr: 10.0.0.100:9999&#10;&#10;transport:&#10;  protocol: kcp&#10;  kcp:&#10;    key: your-secret-key-here"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button type="button" class="btn btn-primary" onclick="saveNewConfig()">
                        <i class="fas fa-save"></i> Create
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Configuration Modal -->
    <div class="modal fade" id="editConfigModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-edit"></i> Edit Configuration
                    </h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-config-id">
                    <div class="form-group">
                        <label for="edit-config-name">Configuration Name</label>
                        <input type="text" class="form-control" id="edit-config-name">
                    </div>
                    <div class="form-group">
                        <label for="edit-config-role">Role</label>
                        <select class="form-control" id="edit-config-role">
                            <option value="client">Client</option>
                            <option value="server">Server</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-config-yaml">YAML Configuration</label>
                        <textarea class="form-control" id="edit-config-yaml" rows="12"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button type="button" class="btn btn-primary" onclick="saveEditConfig()">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.6/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>

    <script>
        function showToast(message, type = 'info') {
            const alertClass = type === 'error' ? 'alert-danger' : `alert-${type}`;
            const icon = {
                'error': 'exclamation-circle',
                'warning': 'exclamation-triangle',
                'success': 'check-circle',
                'info': 'info-circle'
            }[type] || 'info-circle';

            const alert = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${icon}"></i> ${message}
                    <button type="button" class="close" data-dismiss="alert">
                        <span>&times;</span>
                    </button>
                </div>
            `;
            $('#alerts-container').prepend(alert);

            setTimeout(() => {
                $('.alert:first').fadeOut(() => $('.alert:first').remove());
            }, 5000);
        }

        function loadConfigs() {
            axios.get('/panel/api/configs')
                .then(response => {
                    const configs = response.data.data || [];
                    renderConfigs(configs);
                })
                .catch(error => {
                    showToast('Failed to load configurations', 'error');
                    console.error(error);
                });
        }

        function renderConfigs(configs) {
            let html = '';
            if (configs.length === 0) {
                html = '<div class="alert alert-info"><i class="fas fa-info-circle"></i> No configurations found. Create your first configuration!</div>';
            } else {
                configs.forEach(config => {
                    const activeClass = config.active ? 'active' : '';
                    const roleBadge = config.role === 'client' ? 
                        '<span class="badge badge-client">Client</span>' :
                        '<span class="badge badge-server">Server</span>';
                    const statusBadge = config.active ?
                        '<span class="badge badge-success"><i class="fas fa-circle"></i> Active</span>' :
                        '<span class="badge badge-secondary"><i class="fas fa-circle"></i> Inactive</span>';

                    html += `
                        <div class="config-item ${activeClass}">
                            <div class="config-info">
                                <h6>${config.name}</h6>
                                <small>${roleBadge} ${statusBadge}</small>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-primary" onclick="editConfig(${config.id})">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-success" onclick="startConfig(${config.id})">
                                    <i class="fas fa-play"></i>
                                </button>
                                <button class="btn btn-sm btn-warning" onclick="testConfig(${config.id})">
                                    <i class="fas fa-flask"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteConfig(${config.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            $('#configs-container').html(html);
        }

        function saveNewConfig() {
            const name = $('#config-name').val();
            const role = $('#config-role').val();
            const yaml = $('#config-yaml').val();

            if (!name || !role || !yaml) {
                showToast('Please fill all fields', 'warning');
                return;
            }

            axios.post('/panel/api/configs', { name, role, config_yaml: yaml })
                .then(response => {
                    showToast('Configuration created successfully', 'success');
                    $('#newConfigModal').modal('hide');
                    loadConfigs();
                    // Clear form
                    $('#config-name').val('');
                    $('#config-role').val('');
                    $('#config-yaml').val('');
                })
                .catch(error => {
                    showToast('Failed to create configuration', 'error');
                    console.error(error);
                });
        }

        function editConfig(id) {
            // Load config data and show modal
            axios.get(`/panel/api/configs`)
                .then(response => {
                    const config = response.data.data.find(c => c.id === id);
                    if (config) {
                        $('#edit-config-id').val(config.id);
                        $('#edit-config-name').val(config.name);
                        $('#edit-config-role').val(config.role);
                        $('#edit-config-yaml').val(config.config_yaml);
                        $('#editConfigModal').modal('show');
                    }
                });
        }

        function saveEditConfig() {
            const id = $('#edit-config-id').val();
            const name = $('#edit-config-name').val();
            const role = $('#edit-config-role').val();
            const yaml = $('#edit-config-yaml').val();

            axios.put(`/panel/api/configs/${id}`, { name, role, config_yaml: yaml })
                .then(response => {
                    showToast('Configuration updated successfully', 'success');
                    $('#editConfigModal').modal('hide');
                    loadConfigs();
                })
                .catch(error => {
                    showToast('Failed to update configuration', 'error');
                    console.error(error);
                });
        }

        function startConfig(id) {
            axios.post(`/panel/api/configs/${id}/start`)
                .then(response => {
                    showToast('Configuration started', 'success');
                    loadConfigs();
                })
                .catch(error => {
                    showToast('Failed to start configuration', 'error');
                });
        }

        function testConfig(id) {
            axios.post(`/panel/api/configs/${id}/test`)
                .then(response => {
                    const msg = response.data.success ? 'Configuration is valid' : 'Configuration has errors';
                    showToast(msg, response.data.success ? 'success' : 'error');
                })
                .catch(error => {
                    showToast('Failed to test configuration', 'error');
                });
        }

        function deleteConfig(id) {
            if (confirm('Are you sure you want to delete this configuration?')) {
                axios.delete(`/panel/api/configs/${id}`)
                    .then(response => {
                        showToast('Configuration deleted', 'success');
                        loadConfigs();
                    })
                    .catch(error => {
                        showToast('Failed to delete configuration', 'error');
                    });
            }
        }

        function refreshConfigs() {
            loadConfigs();
        }

        $(document).ready(function() {
            loadConfigs();
        });
    </script>
</body>
</html>
